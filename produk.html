<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Manajemen Produk</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="beli-page">
    <header>
        <nav class="navigation">
            <div class="logo">
                <img src="icon.png" width="40">
                <h1>Admin Panel</h1>
            </div>

            <ul class="menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="produk.html">Produk</a></li>
                <li><a href="history.html">History</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="upper-section">

            <!-- FORM -->
            <div class="form-box">
                <h2>Manajemen Inventaris</h2>
                <p>Tambah / Edit Produk</p>

                <form id="formBarang">

                    <label>Kode Barang</label>
                    <input type="text" id="kode">

                    <label>Nama Barang</label>
                    <input type="text" id="nama">

                    <label>Kategori</label>
                    <select id="kategori" class="small-select">
                        <option value="">-- Pilih Kategori --</option>
                        <option>Steam Wallet</option>
                        <option>Epic Games Wallet</option>
                        <option>Ubisoft Wallet</option>
                    </select>

                    <label>Stok</label>
                    <input type="number" id="stok">

                    <label>Harga</label>
                    <input type="number" id="harga">

                    <label>Tanggal Masuk</label>
                    <input type="date" id="tanggal">

                    <button type="submit" class="btn-beli">Simpan Produk</button>
                </form>
            </div>

            <!-- STATISTIK -->
            <div class="statistik-box" id="statistik">
                <div style="text-align:center;">
                    <img src="icon.png" width="200">
                    <h3>Statistik</h3>
                </div>
            </div>

        </section>

        <!-- SEARCH & FILTER -->
        <section class="search-filter">
            <input type="text" id="search" placeholder="Cari nama / kode barang...">

            <select id="filterKategori">
                <option value="">Semua Kategori</option>
                <option value="Steam Wallet">Steam Wallet</option>
                <option value="Epic Games Wallet">Epic Games Wallet</option>
                <option value="Ubisoft Wallet">Ubisoft Wallet</option>
            </select>
        </section>

        <!-- TABEL -->
        <section class="tabel-pembelian">
            <h2>Data Produk</h2>

            <table>
                <thead>
                    <tr>
                        <th>Kode</th>
                        <th>Nama</th>
                        <th>Kategori</th>
                        <th>Stok</th>
                        <th>Harga</th>
                        <th>Tanggal</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </section>

    </main>

    <footer class="footer">
        <div class="footer-container">
            <div class="footer-note">
                <h3>Admin Panel</h3>
                <p>Manajemen Produk Inventaris</p>
            </div>

            <div class="footer-note">
                <h3>Menu</h3>
                <a href="index.html">Home</a>
                <a href="produk.html">Produk</a>
            </div>

            <div class="footer-note">
                <h3>Kontak</h3>
                <p>Email: admin@store.com</p>
            </div>
        </div>
    </footer>

    <!-- JS -->
    <script src="app.js"></script>

</body>
</html>
